<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" preserveAspectRatio="xMidYMid meet" role="img" aria-label="SuperconducTED banner with animated Bloch sphere">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d17"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0b0d17"/>
    </linearGradient>
    <radialGradient id="sphereFill" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#1e1b4b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- faint orbital rings (background motif) -->
  <g opacity="0.18" stroke="#06b6d4" fill="none" stroke-width="0.6">
    <ellipse cx="220" cy="170" rx="260" ry="78" transform="rotate(-15 220 170)"/>
    <ellipse cx="220" cy="170" rx="260" ry="78" transform="rotate(45 220 170)"/>
    <ellipse cx="220" cy="170" rx="260" ry="78" transform="rotate(110 220 170)"/>
  </g>

  <!-- scattered fuzzy ensemble dots in the background -->
  <g fill="#06b6d4">
    <circle cx="80" cy="60" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="40" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.5s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="60" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="5s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="270" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.5s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="290" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.8s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="80" r="1" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="120" r="1.2" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.2s" begin="2.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Bloch sphere group -->
  <g transform="translate(220 170)">
    <!-- sphere fill -->
    <circle r="115" fill="url(#sphereFill)"/>

    <!-- back equator (dashed, behind) -->
    <path d="M -115 0 A 115 36 0 0 1 115 0" fill="none" stroke="#06b6d4" stroke-width="0.9" opacity="0.35" stroke-dasharray="3 3"/>
    <!-- front equator -->
    <path d="M -115 0 A 115 36 0 0 0 115 0" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.75"/>

    <!-- meridian (vertical great circle, side view) -->
    <ellipse rx="36" ry="115" fill="none" stroke="#06b6d4" stroke-width="0.9" opacity="0.4" stroke-dasharray="3 3"/>

    <!-- outline -->
    <circle r="115" fill="none" stroke="#06b6d4" stroke-width="1.6"/>

    <!-- axes -->
    <line x1="0" y1="-135" x2="0" y2="135" stroke="#64748b" stroke-width="0.8" stroke-dasharray="2 3"/>
    <line x1="-135" y1="0" x2="135" y2="0" stroke="#64748b" stroke-width="0.8" stroke-dasharray="2 3"/>

    <!-- state labels -->
    <text x="0" y="-144" text-anchor="middle" fill="#a3b8ff" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="500">|0⟩</text>
    <text x="0" y="158" text-anchor="middle" fill="#a3b8ff" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="500">|1⟩</text>
    <text x="148" y="5" text-anchor="start" fill="#475569" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11">x</text>
    <text x="-148" y="5" text-anchor="end" fill="#475569" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11">y</text>

    <!-- precessing state vector -->
    <g filter="url(#glow)">
      <g>
        <line x1="0" y1="0" x2="0" y2="-95" stroke="#7f5af0" stroke-width="2.8" stroke-linecap="round"/>
        <polygon points="-5,-90 5,-90 0,-102" fill="#7f5af0"/>
        <circle cx="0" cy="-95" r="4.5" fill="#7f5af0"/>
        <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="-35" to="325" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- origin dot -->
    <circle r="3.2" fill="#06b6d4" filter="url(#glow)"/>

    <!-- fuzzy sample dots around the sphere (the ensemble) -->
    <g fill="#06b6d4" filter="url(#glow)">
      <circle cx="55" cy="-40" r="2.2"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="-60" cy="-72" r="2.2"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="78" cy="22" r="2.2"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
      <circle cx="-32" cy="58" r="2.2"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="65" cy="-82" r="2.2"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="-90" cy="20" r="2.2"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3s" begin="2.5s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- Title block -->
  <g transform="translate(470 145)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-1">Superconduc<tspan fill="#06b6d4">TED</tspan></text>
    <text x="2" y="36" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#a3b8ff" letter-spacing="3">SUPERCONDUCTED  ·  TED UNIVERSITY  ·  ANKARA</text>
    <line x1="2" y1="58" x2="700" y2="58" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <text x="2" y="86" font-family="ui-sans-serif, Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="0.3">fuzzy logic  ·  quantum noise  ·  Qiskit Aer  ·  research preview</text>
  </g>

  <!-- corner annotation -->
  <g transform="translate(1180 308)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" fill="#475569" text-anchor="end">
    <text>v0 · phase 0 shipped</text>
  </g>
</svg>
